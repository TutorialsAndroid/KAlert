<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TITLE -->
    <title>KAlert.js Demo</title>
    <!-- DESCRIPTION -->
    <meta name="description" content="Modern JavaScript Alert Dialog Library" />
    <!-- KEYWORDS -->
    <meta
      name="keywords"
      content="JavaScript, alert, dialog, library, kalert"
    />
    <!-- AUTHOR -->
    <meta name="author" content="TutorialsAndroid" />

    <script src="https://cdn.jsdelivr.net/gh/TutorialsAndroid/KAlert@v1.2.0/kalertdialog.js"></script>

    <style>
      body {
        font-family: system-ui;
        background: linear-gradient(135deg, #6366f1, #3b82f6);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        width: 420px;
        text-align: center;
      }

      h1 {
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      button {
        border: none;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.25s;
        color: white;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }

      .success {
        background: #22c55e;
      }

      .error {
        background: #ef4444;
      }

      .warning {
        background: #f59e0b;
      }

      .info {
        background: #3b82f6;
      }

      .footer {
        margin-top: 25px;
        font-size: 13px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>KAlert.js Demo</h1>

      <div class="subtitle">Modern JavaScript Alert Dialog Library</div>

      <div class="buttons">
        <button
          class="success"
          onclick="
            KAlert.show({
              title: 'Success',
              message: 'Operation successful!',
              type: 'success',
            })
          "
        >
          Success Alert
        </button>

        <button
          class="error"
          onclick="
            KAlert.show({
              title: 'Error',
              message: 'Something went wrong!',
              type: 'error',
            })
          "
        >
          Error Alert
        </button>

        <button
          class="warning"
          onclick="
            KAlert.show({
              title: 'Warning',
              message: 'Are you sure about this?',
              type: 'warning',
            })
          "
        >
          Warning Alert
        </button>

        <button
          class="info"
          onclick="
            KAlert.show({
              title: 'Information',
              message: 'Here is some information.',
              type: 'info',
            })
          "
        >
          Info Alert
        </button>

        <button class="info" onclick="confirmExample()">
          Confirm Dialog Example
        </button>

        <button class="success" onclick="promptExample()">
          Prompt Dialog Example
        </button>
      </div>

      <div class="footer">Powered by <b>KAlert.js v1.2.0</b></div>
    </div>

    <script>
      function confirmExample() {
        KAlert.confirm({
          title: "Continue?",
          message: "Do you want to proceed?",
        }).then((result) => {
          if (result) {
            KAlert.show({
              title: "Confirmed",
              message: "You pressed confirm",
              type: "success",
            });
          } else {
            KAlert.show({
              title: "Cancelled",
              message: "You cancelled the action",
              type: "error",
            });
          }
        });
      }

      function promptExample() {
        KAlert.prompt({
          title: "Enter your name",
          placeholder: "Type here...",
        }).then((value) => {
          if (value) {
            KAlert.show({
              title: "Hello!",
              message: value,
              type: "success",
            });
          }
        });
      }
    </script>
  </body>
</html>
